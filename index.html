  // Send data to StoreAI
  if (navigator.sendBeacon) {
    navigator.sendBeacon(endpoint, JSON.stringify({
      storeToken: storeToken,
      data: kpiData
    }));
  } else {
    fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Store-Token': storeToken
      },
      body: JSON.stringify(kpiData),
      keepalive: true
    }).catch(function() {});
  }
})();
</script>
